<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="envelope" onclick="toggleEnvelope()">
        <div class="letter">
            <p>Dear Dalis 💖</p>
            <p>You are amazing!</p>
            <p>I really love you 😊</p>
        </div>
    </div>

</div>

<script>
    function toggleEnvelope() {
        document.querySelector(".wrapper").classList.toggle("open");
    }
</script>

</body>
</html>
